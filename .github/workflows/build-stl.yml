name: Build STL

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-stl:
    name: Render STL
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install OpenSCAD and SCAD dependencies
        run: make sync install

      - name: Render STL
        run: make render

      - name: Upload STL artifact
        uses: actions/upload-artifact@v4
        with:
          name: beryl-ax-homeracker-sleeve-stl
          path: renders/beryl_ax_homeracker_sleeve.stl
          if-no-files-found: error

      - name: Attach STL to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: renders/beryl_ax_homeracker_sleeve.stl
          generate_release_notes: true
